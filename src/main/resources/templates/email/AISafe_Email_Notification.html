<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title th:text="${title}">Icentric Notification</title>
  <style>
    * { box-sizing: border-box; }
    body, table, td, p, a {
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
    }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    body { margin: 0 !important; padding: 0 !important; width: 100% !important; }
    
    @media only screen and (max-width: 620px) {
      .email-container { width: 100% !important; }
      .pad-mobile { padding: 24px 20px !important; }
      .title-mobile { font-size: 20px !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#F1F5F9;font-family:'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#F1F5F9;padding:32px 0;">
    <tr>
      <td align="center">
        <!-- Email Container -->
        <table class="email-container" role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;margin:0 auto;background-color:#ffffff;border-radius:16px;overflow:hidden;border:1px solid #E2E8F0;box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.03);">
          
          <!-- Header -->
          <tr>
            <td style="padding-bottom:0;">
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                <tr>
                  <td style="padding:20px 28px;background-color:#0F172A;border-radius:14px 14px 0 0;border-bottom:none;">
                    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                      <tr>
                        <td valign="middle">
                          <span style="font-family:'Inter',sans-serif;font-size:20px;font-weight:800;letter-spacing:-0.03em;color:#FFFFFF;">I<span style="color:#6366F1;">centric</span></span>
                        </td>
                        <td align="right" valign="middle">
                          <span style="font-family:'Inter',sans-serif;font-size:11px;font-weight:600;color:#E2E8F0;background-color:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);padding:4px 10px;border-radius:6px;letter-spacing:0.06em;text-transform:uppercase;" th:text="${tenantName}">Acme Corp</span>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Accent Line & Body -->
          <tr>
            <td style="background-color:#ffffff;">
              <div style="height:4px;background:linear-gradient(90deg,#4F46E5,#6366F1,transparent);"></div>
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                <tr>
                  <td class="pad-mobile" style="padding:36px 40px 28px;">

                    <!-- Alert pill -->
                    <div style="display:inline-block;margin-bottom:20px;">
                      <span style="font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:#4F46E5;background-color:#EEF2FF;border:1px solid #C7D2FE;padding:5px 14px;border-radius:9999px;letter-spacing:0.04em;text-transform:uppercase;" th:text="${notificationPill}">🔔 &nbsp;NOTIFICATION</span>
                    </div>

                    <!-- Greeting -->
                    <p style="font-family:'Inter',sans-serif;font-size:14px;color:#64748B;margin:0 0 10px 0;" th:text="'Hi ' + ${displayName} + ','">Hi Arjun,</p>
                    
                    <!-- Headline Title -->
                    <h1 class="title-mobile" style="font-family:'Inter',sans-serif;font-size:24px;font-weight:800;line-height:1.3;letter-spacing:-0.03em;color:#0F172A;margin:0 0 14px 0;" th:text="${title}">You have a new notification.</h1>
                    
                    <!-- Message Body -->
                    <p style="font-family:'Inter',sans-serif;font-size:15px;line-height:1.65;color:#334155;margin:0 0 28px 0;" th:utext="${message}">Here is the message content.</p>

                    <!-- CTA -->
                    <table role="presentation" cellspacing="0" cellpadding="0" border="0" th:if="${actionUrl != null}">
                      <tr>
                        <td style="border-radius:8px;background:linear-gradient(135deg,#4F46E5 0%,#6366F1 100%);box-shadow: 0 4px 6px -1px rgba(79,70,229,0.2), 0 2px 4px -1px rgba(79,70,229,0.1);">
                          <a th:href="${actionUrl}" style="font-family:'Inter',sans-serif;font-size:14px;font-weight:600;color:#ffffff;text-decoration:none;padding:14px 30px;display:inline-block;border-radius:8px;letter-spacing:0.01em;" th:text="${actionText}">View Details →</a>
                        </td>
                      </tr>
                    </table>

                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color:#F8FAFC;border-top:1px solid #E2E8F0;border-radius:0 0 16px 16px;padding:24px 28px;">
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                <tr>
                  <td>
                    <p style="font-family:'Inter',sans-serif;font-size:12px;color:#64748B;margin:0;line-height:1.6;">
                      Powered by <strong>Icentric</strong> &nbsp;·&nbsp; 
                      <a href="https://icentric.com/privacy" style="color:#4F46E5;text-decoration:none;font-weight:500;">Privacy policy</a>
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
