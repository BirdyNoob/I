spring.application.name=Icentric
spring.datasource.url=jdbc:postgresql://localhost:5432/aisafe
spring.datasource.username=postgres
spring.datasource.password=root

# Hikari Connection Pool High-Concurrency Optimizations
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=15
spring.datasource.hikari.connection-timeout=15000
spring.datasource.hikari.idle-timeout=30000

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.schemas=system
spring.flyway.locations=classpath:db/migration/system
logging.level.org.flywaydb=INFO

# JWT secret — override via ICENTRIC_JWT_SECRET environment variable in production.
# Must be at least 32 bytes (256 bits) for HMAC-SHA256.
icentric.jwt.secret=${ICENTRIC_JWT_SECRET:my-super-secret-key-replace-in-prod!}
icentric.jwt.token-ttl-ms=1800000
icentric.jwt.impersonation-ttl-ms=7200000

# Frontend origins allowed to call the API. Override in each environment.
app.cors.allowed-origin-patterns=http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:4200

# Default Platform Admin Credentials (created automatically on startup if no platform admins exist)
platform.admin.default.email=admin@icentric.com
platform.admin.default.password=ChangeMe@123
platform.admin.default.name=Platform Super Admin

app.public-base-url=http://localhost:8080
app.certificate.storage-root=/tmp/icentric-certificates

# ----------------------------------------
# SMTP Mail Service Configuration (Gmail)
# ----------------------------------------
# Using environment variables for production security with sensible local defaults
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:codequintet@gmail.com}
spring.mail.password=${SMTP_PASSWORD:ythiyyigprrrppgo}

# Default From Address
spring.mail.properties.mail.from=${SMTP_FROM:codequintet@gmail.com}

# Standard Gmail SMTP Properties
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ----------------------------------------
# Frontend URL (for OIDC redirect after login)
# ----------------------------------------
icentric.frontend.url=${FRONTEND_URL:http://localhost:3000}

# ----------------------------------------
# SSO / OIDC Configuration
# All secrets MUST be set via environment variables in production.
# ----------------------------------------

# Google Workspace SSO
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:REPLACE_ME}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:REPLACE_ME}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# Microsoft Entra ID SSO
spring.security.oauth2.client.registration.microsoft.client-id=${MICROSOFT_CLIENT_ID:REPLACE_ME}
spring.security.oauth2.client.registration.microsoft.client-secret=${MICROSOFT_CLIENT_SECRET:REPLACE_ME}
spring.security.oauth2.client.registration.microsoft.scope=openid,profile,email
spring.security.oauth2.client.registration.microsoft.redirect-uri={baseUrl}/login/oauth2/code/microsoft
spring.security.oauth2.client.registration.microsoft.authorization-grant-type=authorization_code

# Microsoft OIDC provider endpoints
# Replace ${MICROSOFT_TENANT_ID} with your Azure Directory (tenant) ID
# Use "common" if allowing logins from ANY Microsoft organisation (multi-tenant SaaS)
spring.security.oauth2.client.provider.microsoft.authorization-uri=https://login.microsoftonline.com/${MICROSOFT_TENANT_ID:common}/oauth2/v2.0/authorize
spring.security.oauth2.client.provider.microsoft.token-uri=https://login.microsoftonline.com/${MICROSOFT_TENANT_ID:common}/oauth2/v2.0/token
spring.security.oauth2.client.provider.microsoft.jwk-set-uri=https://login.microsoftonline.com/${MICROSOFT_TENANT_ID:common}/discovery/v2.0/keys
spring.security.oauth2.client.provider.microsoft.user-info-uri=https://graph.microsoft.com/oidc/userinfo
spring.security.oauth2.client.provider.microsoft.user-name-attribute=sub

# ── Certificate Storage ───────────────────────────────────────────────
# Options: "filesystem" (default) or "s3"
app.certificate-storage=filesystem
# S3 config (only needed when app.certificate-storage=s3)
# app.s3.region=ap-south-1
# app.s3.certificate-bucket=icentric-certificates
# app.s3.certificate-prefix=certificates/

# ── Read Replica (disabled by default) ────────────────────────────────
# Set to true when a read replica is available.
# All @Transactional(readOnly=true) queries route to the replica.
app.datasource.replica.enabled=false
